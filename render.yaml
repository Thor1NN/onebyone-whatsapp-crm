services:
  - type: web
    name: onebyone-crm
    runtime: docker
    plan: starter
    healthCheckPath: /
    disk:
      name: whatsapp-auth
      mountPath: /app/.wwebjs_auth
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: onebyone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"

databases:
  - name: onebyone-db
    plan: free
    databaseName: onebyone_crm
